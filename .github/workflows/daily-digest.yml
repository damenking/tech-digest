name: Daily Tech Digest

on:
  schedule:
    # 11 PM ET = 4 AM UTC (EST) or 3 AM UTC (EDT)
    # Using 4 AM UTC to cover most of the year
    - cron: '0 4 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        env:
          ANTHROPIC_PERSONAL_API_KEY: ${{ secrets.ANTHROPIC_PERSONAL_API_KEY }}
        run: python generate_digest.py

      - name: Commit and push digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Digest for $(date -u +%Y-%m-%d)" && git push

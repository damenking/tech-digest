# Tech Digest Configuration

# Maximum number of stories in the daily digest
max_stories: 15

# Claude model to use for summarization
model: claude-sonnet-4-6

# Sources - add/remove as you like
sources:
  rss:
    - name: Ars Technica
      url: https://feeds.arstechnica.com/arstechnica/index
      category: tech

    - name: TechCrunch
      url: https://techcrunch.com/feed/
      category: tech

    - name: MIT Technology Review
      url: https://www.technologyreview.com/feed/
      category: ai

    - name: Wired
      url: https://www.wired.com/feed/rss
      category: tech

    - name: BBC Technology
      url: https://feeds.bbci.co.uk/news/technology/rss.xml
      category: tech

    - name: IEEE Spectrum
      url: https://spectrum.ieee.org/feeds/feed.rss
      category: tech

    - name: OpenAI Blog
      url: https://openai.com/blog/rss.xml
      category: ai

    - name: Google DeepMind Blog
      url: https://deepmind.google/blog/rss.xml
      category: ai

    - name: Simon Willison's Blog
      url: https://simonwillison.net/atom/everything/
      category: ai

  hackernews:
    enabled: true
    # Pull top N stories from HN, then let Claude pick the best ones
    top_n: 30

# Topic categories for grouping (Claude will assign stories to these)
topics:
  - AI & Machine Learning
  - Industry & Business
  - Software & Dev Tools
  - Hardware & Devices
  - Science & Research
  - Policy & Regulation

# Topics and subjects to explicitly EXCLUDE — filter these out aggressively
exclude:
  - Consumer car/EV reviews and automotive news
  - Apple product reviews and Apple gadget news
  - Consumer electronics reviews (phones, tablets, laptops) unless they have a novel technical angle
  - Sports and entertainment

# Topics to prioritize — boost these when selecting stories
prioritize:
  - New AI model releases, benchmarks, and capability announcements
  - New AI product features and tool launches
  - AI infrastructure and compute developments
  - Open source projects and developer tools
  - Tech industry M&A, antitrust, and regulation

# Summarization prompt style
editorial_voice: |
  You have a conversational, slightly opinionated editorial voice. You're writing
  for a senior engineer who is smart but doesn't follow the news daily. When something
  matters, say why in plain language. When something is overhyped, you can gently
  note that. Keep it real — no breathless "revolutionary" or "game-changing" language.
  Think of yourself as a knowledgeable friend catching someone up over coffee.

# Summary length — write substantial summaries (8-12 sentences per story).
# Give real context: what happened, why it matters, who it affects, and your take.
# The reader wants to feel informed after reading just the digest, not like they
# need to click through to get the real story.
summary_length: detailed
